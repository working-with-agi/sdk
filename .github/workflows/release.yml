name: Release

on:
  push:
    branches: [main]

concurrency: ${{ github.workflow }}-${{ github.ref }}

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write
      pull-requests: write
      id-token: write
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
          registry-url: "https://registry.npmjs.org"

      - run: pnpm install --frozen-lockfile
      - run: pnpm build

      - name: Check for changesets
        id: check
        run: |
          if ls .changeset/*.md 1>/dev/null 2>&1; then
            echo "has_changesets=true" >> "$GITHUB_OUTPUT"
          else
            echo "has_changesets=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Create Release PR
        if: steps.check.outputs.has_changesets == 'true'
        uses: changesets/action@v1
        with:
          title: "chore: release packages"
          commit: "chore: release packages"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Publish canonical packages to npm
        if: steps.check.outputs.has_changesets == 'false'
        run: |
          for pkg in packages/core packages/react packages/vue packages/angular; do
            local_ver=$(node -p "require('./$pkg/package.json').version")
            pkg_name=$(node -p "require('./$pkg/package.json').name")
            remote_ver=$(npm view "$pkg_name" version 2>/dev/null || echo "0.0.0")
            if [ "$local_ver" != "$remote_ver" ]; then
              echo "Publishing $pkg_name@$local_ver (remote: $remote_ver)"
              cd "$pkg"
              npm publish --access public --provenance
              cd -
            else
              echo "Skipping $pkg_name@$local_ver (already published)"
            fi
          done
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Publish synonym packages to npm
        if: steps.check.outputs.has_changesets == 'false'
        run: |
          for pkg in synonyms/*/*; do
            if [ -f "$pkg/package.json" ]; then
              local_ver=$(node -p "require('./$pkg/package.json').version")
              pkg_name=$(node -p "require('./$pkg/package.json').name")
              remote_ver=$(npm view "$pkg_name" version 2>/dev/null || echo "0.0.0")
              if [ "$local_ver" != "$remote_ver" ]; then
                echo "Publishing $pkg_name@$local_ver (remote: $remote_ver)"
                cd "$pkg"
                npm publish --access public --provenance
                cd -
              else
                echo "Skipping $pkg_name@$local_ver (already published)"
              fi
            fi
          done
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Publish to GitHub Packages
        if: steps.check.outputs.has_changesets == 'false'
        run: |
          for pkg in packages/*/ synonyms/*/*/; do
            if [ -f "$pkg/package.json" ]; then
              local_ver=$(node -p "require('./$pkg/package.json').version")
              pkg_name=$(node -p "require('./$pkg/package.json').name")
              remote_ver=$(npm view "$pkg_name" version --registry=https://npm.pkg.github.com/ 2>/dev/null || echo "0.0.0")
              if [ "$local_ver" != "$remote_ver" ]; then
                cd "$pkg"
                npm publish --registry=https://npm.pkg.github.com/
                cd -
              fi
            fi
          done
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
